services:
  postgres:
    image: postgres:16
    container_name: cost_analysis_postgres
    restart: always
    environment:
      POSTGRES_USER: cost_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: cost_analysis_reporting
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: